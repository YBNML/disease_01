data:
  database_root: ../database
  num_workers: 4
  batch_size: 32
  image_size: 224

model:
  num_classes: 2
  pretrained: true

train:
  epochs: 30
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  use_weighted_sampler: true

eval:
  save_misclassified: true
  save_qualitative_every_n_epochs: 5

output:
  root: ../outputs/classification

seed: 42
device: auto
